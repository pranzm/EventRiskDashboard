services:
  - type: web
    name: asob-risk-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
